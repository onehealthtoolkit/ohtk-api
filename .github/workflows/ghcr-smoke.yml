name: ghcr smoke

on:
  push:
    branches:
      - codex/ghcr-smoke-test
  workflow_dispatch:

jobs:
  push-smoke-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/onehealthtoolkit/ohtk-api-ghcr-smoke
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tiny test image
        run: |
          cat > Dockerfile <<'EOF'
          FROM alpine:3.20
          CMD ["echo", "ghcr smoke ok"]
          EOF

      - name: Build image
        run: docker build -t $IMAGE:manual-${GITHUB_RUN_ID} .

      - name: Push image
        run: docker push $IMAGE:manual-${GITHUB_RUN_ID}
